project_id = "picom"

[api]
enabled = true
port = 55421
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55422
shadow_port = 55420
major_version = 15

[studio]
enabled = true
port = 55423
api_url = "http://127.0.0.1:55421"

[inbucket]
enabled = true
port = 55424
smtp_port = 55425
pop3_port = 55426

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173", "picom://auth/callback", "picom://auth/reset-password", "picom://auth/verify-email"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Hosted/staging/production Auth password-reset and verification mail must send as
# info@picom.gg via custom SMTP (Dashboard Authentication > SMTP, or
# `npm run auth:smtp:sender`). Local Inbucket keeps using the built-in catcher.
# [auth.email.smtp]
# enabled = true
# host = "env(SMTP_HOST)"
# port = 587
# user = "env(SMTP_USER)"
# pass = "env(SMTP_PASS)"
# admin_email = "info@picom.gg"
# sender_name = "Picom"

[functions.health]
verify_jwt = false

[functions.client-config]
verify_jwt = false

[functions.livekit-token]
verify_jwt = true

[functions.voice-occupancy]
verify_jwt = true

[functions.voice-call-authorize]
verify_jwt = true

[functions.admin-health]
verify_jwt = true

[functions.meeting-join]
verify_jwt = true

[functions.meeting-token]
verify_jwt = true

[functions.meeting-captions]
verify_jwt = true

[functions.meeting-captions-agent]
verify_jwt = false

[functions.livekit-webhook]
verify_jwt = false

[functions.livekit-moderation]
verify_jwt = true

[functions.accept-invite]
verify_jwt = true

[functions.moderation-helper]
verify_jwt = true

[functions.notification-fanout]
verify_jwt = true

[functions.validate-file]
verify_jwt = true

[functions.webhook-message]
verify_jwt = false

[functions.user-data-export]
verify_jwt = true

[functions.account-deletion]
