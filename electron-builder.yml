appId: com.picom.desktop
productName: Picom
copyright: Copyright (c) 2026 Picom

directories:
  output: release
  buildResources: assets/brand

files:
  - dist/**/*
  - dist-electron/**/*
  - assets/brand/app-icon.ico
  - assets/brand/app-icon.png
  - assets/brand/app-icon.svg
  - assets/brand/icons/**/*
  - package.json

asar: true

protocols:
  - name: Picom Protocol
    schemes:
      - picom

extraMetadata:
  main: dist-electron/main.cjs

win:
  icon: assets/brand/app-icon.ico
  executableName: Picom
  requestedExecutionLevel: asInvoker
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Picom-${version}-${channel}-Windows-${arch}.${ext}
  # Production code-signing placeholder. Do not commit certificate files or passwords.
  # Local/internal builds remain intentionally unsigned. Protected release CI injects
  # the approved managed-signing hook or electron-builder CSC_LINK/CSC_KEY_PASSWORD.
  # Timestamp and publisher verification are release gates; see
  # docs/release/windows-code-signing-final.md.
  # certificateFile: ${env.WINDOWS_CERTIFICATE_FILE}
  # certificatePassword: ${env.WINDOWS_CERTIFICATE_PASSWORD}

nsis:
  installerIcon: assets/brand/app-icon.ico
  uninstallerIcon: assets/brand/app-icon.ico
  installerHeader: assets/installer/windows/installer-header.bmp
  installerSidebar: assets/installer/windows/installer-sidebar.bmp
  uninstallerSidebar: assets/installer/windows/installer-sidebar.bmp
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Picom

linux:
  icon: assets/brand/icons
  syncDesktopName: true
  category: Network
  executableName: Picom
  maintainer: Picom Contributors
  synopsis: Desktop community workspace
  description: Picom is a premium desktop community workspace for chat, channels, and shared activity.
  desktop:
    entry:
      Name: Picom
      Comment: Desktop community workspace
      Categories: Network;Chat;Utility;
      Terminal: "false"
      StartupWMClass: Picom
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  artifactName: Picom-${version}-${channel}-Linux-${arch}.${ext}

deb:
  packageCategory: net
  priority: optional

mac:
  icon: assets/brand/app-icon.png
  category: public.app-category.social-networking
  # Safe local/unsigned package defaults. Protected macOS release CI must override
  # hardenedRuntime/notarize and reference the reviewed entitlements templates.
  # See docs/release/macos-signing-notarization-final.md.
  hardenedRuntime: false
  gatekeeperAssess: false
  # notarize: true
  # entitlements: assets/brand/entitlements.mac.plist
  # entitlementsInherit: assets/brand/entitlements.mac.inherit.plist
  extendInfo:
    NSMicrophoneUsageDescription: Picom uses microphone access for MVP voice rooms when you join a voice channel.
    NSScreenCaptureUsageDescription: Picom uses screen recording access only when you choose to share your screen.
  target:
    - target: dmg
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: Picom-${version}-${channel}-macOS-${arch}.${ext}

dmg:
  title: Picom ${version}
  background: assets/installer/macos/dmg-background.png
  iconSize: 104
  contents:
    - x: 176
      y: 224
      type: file
    - x: 484
      y: 224
      type: link
      path: /Applications

publish: null
