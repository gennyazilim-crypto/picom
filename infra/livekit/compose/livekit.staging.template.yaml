# Generated into /etc/picom-livekit/secrets/livekit.yaml with mode 0640.
# TURN remains disabled until Task 662 installs reviewed DNS/TLS/firewall values.
port: __SIGNAL_PORT__
prometheus_port: __METRICS_PORT__
rtc:
  tcp_port: __RTC_TCP_PORT__
  port_range_start: __RTC_UDP_START__
  port_range_end: __RTC_UDP_END__
  use_external_ip: true
redis:
  address: 127.0.0.1:__REDIS_PORT__
  password: "__REDIS_PASSWORD__"
  db: 0
keys:
  "__LIVEKIT_API_KEY__": "__LIVEKIT_API_SECRET__"
turn:
  enabled: false
room:
  empty_timeout: 300
  departure_timeout: 20
logging:
  level: info
  json: true
