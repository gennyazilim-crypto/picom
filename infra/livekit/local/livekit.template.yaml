# Picom local-development template. The placeholders are replaced only inside
# the ignored .tmp/picom-livekit-local directory. Never add real keys here.
port: __PICOM_SIGNAL_PORT__
rtc:
  tcp_port: __PICOM_RTC_TCP_PORT__
  udp_port: __PICOM_RTC_UDP_PORT__
  use_external_ip: false
  enable_loopback_candidate: true
logging:
  level: info
keys:
  "__PICOM_LOCAL_API_KEY__": "__PICOM_LOCAL_API_SECRET__"
