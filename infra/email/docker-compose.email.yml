services:
  picom-email-worker:
    build:
      context: ../..
      dockerfile: infra/email/Dockerfile
    restart: unless-stopped
    env_file: /etc/picom/email-worker.env
    ports:
      - "127.0.0.1:8787:8787"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
