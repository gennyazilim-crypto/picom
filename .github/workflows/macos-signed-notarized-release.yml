name: macOS signed notarized release candidate

on:
  workflow_dispatch:
    inputs:
      confirm_notarized_candidate:
        description: Build a protected signed/notarized macOS candidate without publishing it
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  notarized-candidate:
    if: inputs.confirm_notarized_candidate == true
    runs-on: macos-latest
    environment: macos-production-signing
    timeout-minutes: 60
    env:
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      VITE_RELEASE_CHANNEL: beta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Materialize protected notary key ephemerally
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID APPLE_API_KEY_P8_BASE64; do
            if [[ -z "${!name:-}" ]]; then echo "Required protected macOS signing configuration is absent: $name" >&2; exit 1; fi
          done
          umask 077
          key_path="$RUNNER_TEMP/picom-notary-key.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"
      - run: npm ci
      - run: npm run quality:gate
      - run: npm run package:mac:signed-candidate
      - name: Verify signature, Gatekeeper and stapled ticket
        run: |
          dmg_path="$(find release -maxdepth 1 -name 'Picom-*-macOS-x64.dmg' -print -quit)"
          ./scripts/verify-macos-signing.sh release/mac/Picom.app "$dmg_path"
      - name: Generate post-stapling checksum and provenance
        run: |
          npm run generate-checksums
          npm run verify-checksums
          npm run generate-provenance
      - name: Remove ephemeral notary key
        if: always()
        run: rm -f "${APPLE_API_KEY:-$RUNNER_TEMP/picom-notary-key.p8}"
      - name: Upload immutable candidate evidence
        uses: actions/upload-artifact@v4
        with:
          name: picom-macos-notarized-candidate
          path: |
            release/Picom-*-macOS-x64.dmg
            release/Picom-*-macOS-x64.zip
            release/SHA256SUMS.txt
            release/provenance.json
          if-no-files-found: error
          retention-days: 14
