name: Picom Hosted Member Voice Screen E2E

on:
  workflow_dispatch:
    inputs:
      staging_confirmation:
        description: Type STAGING_ONLY to run the protected hosted media test
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hosted-member-voice-screen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hosted-member-media:
    name: Hosted active-member voice and screen media
    if: ${{ inputs.staging_confirmation == 'STAGING_ONLY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: hosted-staging
    env:
      PICOM_HOSTED_MEDIA_CONFIRM: STAGING_ONLY
      PICOM_HOSTED_MEDIA_RUN_ID: ${{ github.run_id }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PICOM_HOSTED_MEDIA_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PICOM_HOSTED_MEDIA_ORIGIN: ${{ vars.PICOM_EDGE_ALLOWED_ORIGIN }}
    steps:
      - name: Check out approved source
        uses: actions/checkout@v7

      - name: Set up project Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify hosted media harness contract
        run: npm run voice:screen:hosted:contract

      - name: Verify virtual desktop runtime
        run: command -v xvfb-run >/dev/null

      - name: Run real hosted member voice and screen media matrix
        run: npm run voice:screen:hosted:e2e -- --run

      - name: Publish redacted evidence summary
        if: ${{ always() }}
        run: |
          if [ -f artifacts/evidence/task-665-hosted-member-voice-screen.json ]; then
            node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('artifacts/evidence/task-665-hosted-member-voice-screen.json','utf8'));const m=d.media??{};fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,['## Task 665 hosted member media','','- Status: '+d.status,'- Active actor classes: '+(d.activeActorClasses?.length??0),'- Denied actor classes: '+(d.deniedActorClasses?.length??0),'- Joined clients: '+(m.joinedClients??0),'- Microphone publishers: '+(m.microphonePublishers??0),'- Screen publishers: '+(m.screenPublishers??0),'- Remote audio receivers: '+(m.remoteAudioReceivers??0),'- Remote screen renderers: '+(m.remoteScreenRenderers??0),'- Reconnect passed: '+Boolean(m.reconnectPassed),'- Cleanup passed: '+Boolean(m.cleanupPassed),'- Contains secrets: '+Boolean(d.containsSecrets),''].join('\n'))"
          else
            echo "Task 665 evidence file was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload redacted hosted media evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: task-665-hosted-member-voice-screen-evidence
          path: artifacts/evidence/task-665-hosted-member-voice-screen.json
          if-no-files-found: warn
          retention-days: 14
