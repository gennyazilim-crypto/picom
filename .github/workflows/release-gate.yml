name: Picom Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - release/**
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release candidate evidence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run mock smoke tests
        run: npm run mock:smoke

      - name: Build release candidate
        run: npm run build

      - name: Enforce renderer performance budgets
        run: npm run performance:budget:ci

      - name: Validate visual regression contract
        run: npm run visual:regression:contract

      - name: Validate E2E coverage contract
        run: npm run e2e:coverage:contract

      - name: Validate checksum generation contract
        run: npm run release:checksums:smoke

      - name: Validate provenance generation contract
        run: npm run release:provenance:smoke

      - name: Enforce documented stable Go/No-Go decision
        run: npm run release:go-no-go:guard

      - name: Add safe failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## Release gate failed"
            echo "The release candidate remains blocked. Do not publish or promote artifacts."
            echo "Review the failed evidence step and the stable Go/No-Go document."
          } >> "$GITHUB_STEP_SUMMARY"
