name: Picom QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    name: QA smoke, typecheck, and build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret exposure smoke
        run: npm run secrets:smoke

      - name: Verify third-party license inventory
        run: npm run licenses:check

      - name: Verify dependency update train policy
        run: npm run dependency:update:train:smoke

      - name: Run QA smoke gate
        run: npm run qa:smoke

      - name: Run Supabase QA gate
        run: npm run qa:supabase

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron main
        run: npm run build

      - name: Enforce renderer performance budgets
        run: npm run performance:budget:ci

      - name: Verify visual regression coverage contract
        run: npm run visual:regression:contract

      - name: Verify E2E core-flow coverage contract
        run: npm run e2e:coverage:contract

      - name: Verify release checksum generator
        run: npm run release:checksums:smoke

      - name: Verify release provenance generator
        run: npm run release:provenance:smoke
