name: Picom QA

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Required QA
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Scan repository for exposed secrets
        run: npm run secrets:smoke
      - name: Verify Picom email sender policy
        run: npm run email:sender:scan
      - name: Verify Picom email system contract
        run: npm run email:smoke

      - name: Verify third-party license inventory
        run: npm run licenses:check

      - name: Verify dependency update policy
        run: npm run dependency:update:train:smoke

      - name: Verify API versioning enforcement
        run: npm run api:versioning:enforcement:smoke

      - name: Typecheck
        run: npm run typecheck

      - name: Run mock smoke tests
        run: npm run mock:smoke

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Run deterministic QA smoke gate
        run: npm run qa:smoke

      - name: Run static Supabase contract gate
        run: npm run qa:supabase

      - name: Verify visual regression coverage contract
        run: npm run visual:regression:contract

      - name: Verify E2E core-flow coverage contract
        run: npm run e2e:coverage:contract

      - name: Verify release checksum generator contract
        run: npm run release:checksums:smoke

      - name: Verify release provenance generator contract
        run: npm run release:provenance:smoke

      - name: Validate GitHub Actions contracts
        run: npm run ci:workflow:smoke

      - name: Add safe failure summary
        if: failure()
        shell: bash
        run: |
          {
            echo "## Picom QA failed"
            echo "A required deterministic check failed. Review the failed step above."
            echo "Hosted credentials and local environment files are never included in this summary."
          } >> "$GITHUB_STEP_SUMMARY"
