name: Picom QA

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  qa:
    name: QA smoke, typecheck, and build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run QA smoke gate
        run: npm run qa:smoke

      - name: Run Supabase QA gate
        run: npm run qa:supabase

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer and Electron main
        run: npm run build
