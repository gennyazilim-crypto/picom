name: Picom Hosted Validation

on:
  workflow_dispatch:
    inputs:
      staging_confirmation:
        description: Type STAGING_ONLY to run destructive-safe staging probes
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: hosted-v1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  v1-hosted-supabase:
    name: V1 hosted Supabase closure
    if: ${{ inputs.staging_confirmation == 'STAGING_ONLY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: hosted-staging
    env:
      PICOM_RLS_STAGING_URL: ${{ secrets.PICOM_RLS_STAGING_URL }}
      PICOM_RLS_STAGING_ANON_KEY: ${{ secrets.PICOM_RLS_STAGING_ANON_KEY }}
      PICOM_RLS_STAGING_CONFIRM: STAGING_ONLY
      PICOM_RLS_MUTATION_CONFIRM: ALLOW_EPHEMERAL_WRITES
      PICOM_RLS_OWNER_EMAIL: ${{ secrets.PICOM_RLS_OWNER_EMAIL }}
      PICOM_RLS_OWNER_PASSWORD: ${{ secrets.PICOM_RLS_OWNER_PASSWORD }}
      PICOM_RLS_ADMIN_EMAIL: ${{ secrets.PICOM_RLS_ADMIN_EMAIL }}
      PICOM_RLS_ADMIN_PASSWORD: ${{ secrets.PICOM_RLS_ADMIN_PASSWORD }}
      PICOM_RLS_MODERATOR_EMAIL: ${{ secrets.PICOM_RLS_MODERATOR_EMAIL }}
      PICOM_RLS_MODERATOR_PASSWORD: ${{ secrets.PICOM_RLS_MODERATOR_PASSWORD }}
      PICOM_RLS_MEMBER_EMAIL: ${{ secrets.PICOM_RLS_MEMBER_EMAIL }}
      PICOM_RLS_MEMBER_PASSWORD: ${{ secrets.PICOM_RLS_MEMBER_PASSWORD }}
      PICOM_RLS_VISITOR_EMAIL: ${{ secrets.PICOM_RLS_VISITOR_EMAIL }}
      PICOM_RLS_VISITOR_PASSWORD: ${{ secrets.PICOM_RLS_VISITOR_PASSWORD }}
      PICOM_RLS_BLOCKED_EMAIL: ${{ secrets.PICOM_RLS_BLOCKED_EMAIL }}
      PICOM_RLS_BLOCKED_PASSWORD: ${{ secrets.PICOM_RLS_BLOCKED_PASSWORD }}
      PICOM_RLS_DM_NON_PARTICIPANT_EMAIL: ${{ secrets.PICOM_RLS_DM_NON_PARTICIPANT_EMAIL }}
      PICOM_RLS_DM_NON_PARTICIPANT_PASSWORD: ${{ secrets.PICOM_RLS_DM_NON_PARTICIPANT_PASSWORD }}
      PICOM_RLS_COMMUNITY_ID: ${{ vars.PICOM_RLS_COMMUNITY_ID }}
      PICOM_RLS_PUBLIC_CHANNEL_ID: ${{ vars.PICOM_RLS_PUBLIC_CHANNEL_ID }}
      PICOM_RLS_PRIVATE_CHANNEL_ID: ${{ vars.PICOM_RLS_PRIVATE_CHANNEL_ID }}
      PICOM_RLS_PRIVATE_MESSAGE_ID: ${{ vars.PICOM_RLS_PRIVATE_MESSAGE_ID }}
      PICOM_RLS_PRIVATE_REPLY_ID: ${{ vars.PICOM_RLS_PRIVATE_REPLY_ID }}
      PICOM_RLS_PRIVATE_ATTACHMENT_ID: ${{ vars.PICOM_RLS_PRIVATE_ATTACHMENT_ID }}
      PICOM_RLS_PRIVATE_REACTION_ID: ${{ vars.PICOM_RLS_PRIVATE_REACTION_ID }}
      PICOM_RLS_PUBLIC_CONTENT_MENTION_ID: ${{ vars.PICOM_RLS_PUBLIC_CONTENT_MENTION_ID }}
      PICOM_RLS_PRIVATE_CONTENT_MENTION_ID: ${{ vars.PICOM_RLS_PRIVATE_CONTENT_MENTION_ID }}
      PICOM_RLS_FOLLOWED_STORY_ID: ${{ vars.PICOM_RLS_FOLLOWED_STORY_ID }}
      PICOM_RLS_OWNER_MEMBER_FRIEND_REQUEST_ID: ${{ vars.PICOM_RLS_OWNER_MEMBER_FRIEND_REQUEST_ID }}
      PICOM_RLS_PRIVATE_PROFILE_USER_ID: ${{ vars.PICOM_RLS_PRIVATE_PROFILE_USER_ID }}
      PICOM_RLS_DM_CONVERSATION_ID: ${{ vars.PICOM_RLS_DM_CONVERSATION_ID }}
      PICOM_RLS_DM_MESSAGE_ID: ${{ vars.PICOM_RLS_DM_MESSAGE_ID }}
      PICOM_RLS_DM_ATTACHMENT_ID: ${{ vars.PICOM_RLS_DM_ATTACHMENT_ID }}
      PICOM_RLS_DM_REACTION_ID: ${{ vars.PICOM_RLS_DM_REACTION_ID }}
      PICOM_RLS_AUDIT_LOG_ID: ${{ vars.PICOM_RLS_AUDIT_LOG_ID }}
      PICOM_RLS_PRIVATE_STORAGE_BUCKET: ${{ vars.PICOM_RLS_PRIVATE_STORAGE_BUCKET }}
      PICOM_RLS_PRIVATE_STORAGE_PATH: ${{ vars.PICOM_RLS_PRIVATE_STORAGE_PATH }}
      PICOM_RLS_PROFILE_MEDIA_BUCKET: ${{ vars.PICOM_RLS_PROFILE_MEDIA_BUCKET }}
      PICOM_RLS_PRIVATE_PROFILE_MEDIA_PATH: ${{ vars.PICOM_RLS_PRIVATE_PROFILE_MEDIA_PATH }}
      PICOM_RLS_DM_STORAGE_BUCKET: ${{ vars.PICOM_RLS_DM_STORAGE_BUCKET }}
      PICOM_RLS_DM_STORAGE_PATH: ${{ vars.PICOM_RLS_DM_STORAGE_PATH }}
      PICOM_REALTIME_STAGING_URL: ${{ secrets.PICOM_RLS_STAGING_URL }}
      PICOM_REALTIME_STAGING_ANON_KEY: ${{ secrets.PICOM_RLS_STAGING_ANON_KEY }}
      PICOM_REALTIME_STAGING_CONFIRM: STAGING_ONLY
      PICOM_REALTIME_CLIENT_A_EMAIL: ${{ secrets.PICOM_REALTIME_CLIENT_A_EMAIL }}
      PICOM_REALTIME_CLIENT_A_PASSWORD: ${{ secrets.PICOM_REALTIME_CLIENT_A_PASSWORD }}
      PICOM_REALTIME_CLIENT_B_EMAIL: ${{ secrets.PICOM_REALTIME_CLIENT_B_EMAIL }}
      PICOM_REALTIME_CLIENT_B_PASSWORD: ${{ secrets.PICOM_REALTIME_CLIENT_B_PASSWORD }}
      PICOM_REALTIME_COMMUNITY_ID: ${{ vars.PICOM_REALTIME_COMMUNITY_ID }}
      PICOM_REALTIME_CHANNEL_ID: ${{ vars.PICOM_REALTIME_CHANNEL_ID }}
      PICOM_EDGE_STAGING_URL: ${{ secrets.PICOM_RLS_STAGING_URL }}
      PICOM_EDGE_STAGING_ANON_KEY: ${{ secrets.PICOM_RLS_STAGING_ANON_KEY }}
      PICOM_EDGE_STAGING_CONFIRM: STAGING_ONLY
      PICOM_EDGE_TEST_EMAIL: ${{ secrets.PICOM_EDGE_TEST_EMAIL }}
      PICOM_EDGE_TEST_PASSWORD: ${{ secrets.PICOM_EDGE_TEST_PASSWORD }}
      PICOM_EDGE_ALLOWED_ORIGIN: ${{ vars.PICOM_EDGE_ALLOWED_ORIGIN }}
      PICOM_LIVEKIT_STAGING_URL: ${{ secrets.PICOM_RLS_STAGING_URL }}
      PICOM_LIVEKIT_STAGING_ANON_KEY: ${{ secrets.PICOM_RLS_STAGING_ANON_KEY }}
      PICOM_LIVEKIT_STAGING_ORIGIN: ${{ vars.PICOM_EDGE_ALLOWED_ORIGIN }}
      PICOM_LIVEKIT_STAGING_CONFIRM: STAGING_ONLY
      PICOM_LIVEKIT_MEMBER_EMAIL: ${{ secrets.PICOM_RLS_MEMBER_EMAIL }}
      PICOM_LIVEKIT_MEMBER_PASSWORD: ${{ secrets.PICOM_RLS_MEMBER_PASSWORD }}
      PICOM_LIVEKIT_VISITOR_EMAIL: ${{ secrets.PICOM_RLS_VISITOR_EMAIL }}
      PICOM_LIVEKIT_VISITOR_PASSWORD: ${{ secrets.PICOM_RLS_VISITOR_PASSWORD }}
      PICOM_LIVEKIT_UNAUTHORIZED_EMAIL: ${{ secrets.PICOM_LIVEKIT_UNAUTHORIZED_EMAIL }}
      PICOM_LIVEKIT_UNAUTHORIZED_PASSWORD: ${{ secrets.PICOM_LIVEKIT_UNAUTHORIZED_PASSWORD }}
      PICOM_LIVEKIT_BANNED_EMAIL: ${{ secrets.PICOM_RLS_BLOCKED_EMAIL }}
      PICOM_LIVEKIT_BANNED_PASSWORD: ${{ secrets.PICOM_RLS_BLOCKED_PASSWORD }}
      PICOM_LIVEKIT_COMMUNITY_ID: ${{ vars.PICOM_RLS_COMMUNITY_ID }}
      PICOM_LIVEKIT_VOICE_CHANNEL_ID: ${{ vars.PICOM_LIVEKIT_VOICE_CHANNEL_ID }}
      PICOM_LIVEKIT_PRIVATE_CHANNEL_ID: ${{ vars.PICOM_LIVEKIT_PRIVATE_CHANNEL_ID }}
      PICOM_VOICE_PERMISSIONS_COMMUNITY_ID: ${{ vars.PICOM_RLS_COMMUNITY_ID }}
      PICOM_VOICE_PERMISSIONS_CHANNEL_ID: ${{ vars.PICOM_LIVEKIT_VOICE_CHANNEL_ID }}
      PICOM_VOICE_PERMISSIONS_PRIVATE_CHANNEL_ID: ${{ vars.PICOM_LIVEKIT_PRIVATE_CHANNEL_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use project Node version
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Verify migration integrity
        run: npm run supabase:migrations:check
      - name: Verify V1 hosted contract
        run: node scripts/v1-hosted-supabase-contract.mjs
      - name: Verify V1 Edge release scope
        run: node scripts/edge-functions-release-scope-smoke.mjs
      - name: Run V1 RLS, Storage, and Realtime authorization matrix
        run: npm run supabase:rls:hosted:test
      - name: Run two-client private Realtime validation
        run: npm run realtime:staging:test
      - name: Run deployed V1 Edge Function boundary validation
        run: npm run edge:staging:test
      - name: Run hosted LiveKit token authorization matrix
        run: npm run livekit:token:staging -- --run
      - name: Run hosted Voice permission and RLS matrix
        run: npm run voice:permissions:hosted -- --run
