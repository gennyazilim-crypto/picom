name: Picom Windows Member Voice Screen Certification

on:
  workflow_dispatch:
    inputs:
      windows_confirmation:
        description: Type CONTROLLED_WINDOWS_ONLY to certify the protected staging candidate
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: windows-member-voice-screen-${{ github.ref }}
  cancel-in-progress: false

jobs:
  certify-windows-member-media:
    name: Packaged Windows active-member media
    if: ${{ inputs.windows_confirmation == 'CONTROLLED_WINDOWS_ONLY' }}
    runs-on: windows-latest
    timeout-minutes: 45
    environment: hosted-staging
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      PICOM_WINDOWS_MEETING_CONFIRM: CONTROLLED_WINDOWS_ONLY
      PICOM_HOSTED_MEDIA_CONFIRM: STAGING_ONLY
      PICOM_HOSTED_MEDIA_RUN_ID: ${{ github.run_id }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PICOM_HOSTED_MEDIA_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PICOM_HOSTED_MEDIA_ORIGIN: ${{ vars.PICOM_EDGE_ALLOWED_ORIGIN }}
    steps:
      - name: Check out approved source
        uses: actions/checkout@v7

      - name: Set up project Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Verify Windows certification contract
        run: npm run voice:screen:windows:contract

      - name: Build controlled Windows certification candidate
        env:
          PICOM_BUILD_WINDOWS_MEMBER_MEDIA_CERTIFICATION: CONTROLLED_WINDOWS_ONLY
        run: npm run package:win

      - name: Install exact NSIS candidate
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem -LiteralPath release -Filter 'Picom-*-Windows-x64.exe' | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1
          if (-not $installer) { throw 'Windows NSIS candidate not found.' }
          $installDir = Join-Path $env:RUNNER_TEMP 'PicomTask666'
          if (Test-Path -LiteralPath $installDir) { Remove-Item -LiteralPath $installDir -Recurse -Force }
          $process = Start-Process -FilePath $installer.FullName -ArgumentList @('/S', "/D=$installDir") -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "NSIS install failed with exit code $($process.ExitCode)." }
          $executable = Join-Path $installDir 'Picom.exe'
          if (-not (Test-Path -LiteralPath $executable)) { throw 'Installed Picom executable not found.' }
          "PICOM_WINDOWS_CERT_INSTALLER=$($installer.FullName)" | Add-Content -LiteralPath $env:GITHUB_ENV
          "PICOM_WINDOWS_CERT_EXECUTABLE=$executable" | Add-Content -LiteralPath $env:GITHUB_ENV
          "PICOM_WINDOWS_CERT_INSTALL_DIR=$installDir" | Add-Content -LiteralPath $env:GITHUB_ENV

      - name: Run packaged Windows member Voice and Screen matrix
        run: npm run voice:screen:windows:certify -- --run

      - name: Scan redacted evidence contract
        run: npm run secrets:smoke

      - name: Publish redacted certification summary
        if: ${{ always() }}
        shell: powershell
        run: |
          $path = 'artifacts/evidence/task-666-packaged-windows-member-voice-screen.json'
          if (-not (Test-Path -LiteralPath $path)) { 'Task 666 evidence was not generated.' | Add-Content $env:GITHUB_STEP_SUMMARY; exit 0 }
          $data = Get-Content -LiteralPath $path -Raw | ConvertFrom-Json
          @(
            '## Task 666 packaged Windows member media'
            ''
            "- Status: $($data.status)"
            "- Installer SHA-256 recorded: $([bool]$data.package.installerSha256)"
            "- Joined clients: $($data.media.joinedClients)"
            "- Simultaneous shares: $($data.media.simultaneousScreenShares)"
            "- Native window capture: $($data.media.nativeWindowCapturePassed)"
            "- Remote render: $($data.nativeCapture.remoteRenderPassed)"
            "- Cleanup: $($data.media.cleanupPassed)"
            "- Contains secrets: $($data.containsSecrets)"
          ) | Add-Content $env:GITHUB_STEP_SUMMARY

      - name: Upload redacted Windows certification evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: task-666-packaged-windows-member-voice-screen-evidence
          path: artifacts/evidence/task-666-packaged-windows-member-voice-screen.json
          if-no-files-found: warn
          retention-days: 14

      - name: Remove controlled installation
        if: ${{ always() }}
        shell: powershell
        run: |
          Get-Process -Name Picom -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          if ($env:PICOM_WINDOWS_CERT_INSTALL_DIR -and (Test-Path -LiteralPath $env:PICOM_WINDOWS_CERT_INSTALL_DIR)) {
            $uninstaller = Get-ChildItem -LiteralPath $env:PICOM_WINDOWS_CERT_INSTALL_DIR -Filter 'Uninstall*.exe' | Select-Object -First 1
            if ($uninstaller) { Start-Process -FilePath $uninstaller.FullName -ArgumentList '/S' -Wait }
            if (Test-Path -LiteralPath $env:PICOM_WINDOWS_CERT_INSTALL_DIR) { Remove-Item -LiteralPath $env:PICOM_WINDOWS_CERT_INSTALL_DIR -Recurse -Force }
          }
