name: Picom Native Package Matrix

on:
  workflow_dispatch:
  pull_request:
    paths:
      - electron/**
      - build/**
      - package.json
      - package-lock.json
      - .github/workflows/package-matrix.yml

permissions:
  contents: read

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows NSIS package
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run package:win
      - name: Upload unsigned Windows candidate
        uses: actions/upload-artifact@v4
        with:
          name: picom-windows-unsigned
          path: |
            release/Picom-*-Windows-x64.exe
            release/win-unpacked/**
          if-no-files-found: error
          retention-days: 7

  linux:
    name: Linux AppImage and DEB packages
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run package:linux:appimage
      - run: npm run package:linux:deb
      - name: Upload Linux candidates
        uses: actions/upload-artifact@v4
        with:
          name: picom-linux-unsigned
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 7

  macos:
    name: macOS DMG and ZIP packages
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run package:mac
      - name: Upload unsigned macOS candidates
        uses: actions/upload-artifact@v4
        with:
          name: picom-macos-unsigned
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 7
