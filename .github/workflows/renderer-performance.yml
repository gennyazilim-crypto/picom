name: Picom Renderer Performance

on:
  workflow_dispatch:
  push:
    branches:
      - release/**
    tags:
      - v*

permissions:
  contents: read

concurrency:
  group: renderer-performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance-budget:
    name: Renderer budget (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and Electron bundles
        run: npm run build

      - name: Enforce renderer performance budgets
        run: npm run performance:budget:ci

      - name: Verify visual regression coverage contract
        run: npm run visual:regression:contract

      - name: Verify E2E core-flow coverage contract
        run: npm run e2e:coverage:contract

      - name: Verify release checksum generator contract
        run: npm run release:checksums:smoke

      - name: Verify release provenance generator contract
        run: npm run release:provenance:smoke
