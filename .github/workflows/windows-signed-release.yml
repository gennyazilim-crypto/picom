name: Windows signed release candidate

on:
  workflow_dispatch:
    inputs:
      confirm_signing_candidate:
        description: Build a protected signed Windows candidate without publishing it
        required: true
        type: boolean
        default: false
      candidate_commit:
        description: Full 40-character commit SHA to freeze for this candidate
        required: true
        type: string
      candidate_version:
        description: Exact V1 package version
        required: true
        type: string
        default: 1.0.0

permissions:
  contents: read

jobs:
  signed-candidate:
    if: inputs.confirm_signing_candidate == true
    runs-on: windows-latest
    environment: windows-production-signing
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      EXPECTED_WINDOWS_PUBLISHER: ${{ vars.WINDOWS_PUBLISHER_SUBJECT }}
      EXPECTED_CANDIDATE_COMMIT: ${{ inputs.candidate_commit }}
      EXPECTED_CANDIDATE_VERSION: ${{ inputs.candidate_version }}
      VITE_RELEASE_CHANNEL: stable
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.candidate_commit }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Fail closed when protected signing configuration is absent
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK)) { throw 'WINDOWS_CSC_LINK is not configured in the protected environment.' }
          if ([string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) { throw 'WINDOWS_CSC_KEY_PASSWORD is not configured in the protected environment.' }
          if ([string]::IsNullOrWhiteSpace($env:EXPECTED_WINDOWS_PUBLISHER)) { throw 'WINDOWS_PUBLISHER_SUBJECT is not configured.' }
      - name: Freeze exact V1 source and version
        shell: pwsh
        run: |
          if ($env:EXPECTED_CANDIDATE_COMMIT -notmatch '^[0-9a-fA-F]{40}$') { throw 'candidate_commit must be a full 40-character SHA.' }
          $actualCommit = (git rev-parse HEAD).Trim()
          if ($actualCommit -ne $env:EXPECTED_CANDIDATE_COMMIT.ToLowerInvariant()) { throw 'Checked-out source does not match candidate_commit.' }
          $actualVersion = (node -p "require('./package.json').version").Trim()
          if ($env:EXPECTED_CANDIDATE_VERSION -ne '1.0.0') { throw 'Picom V1 signed candidate version must be exactly 1.0.0.' }
          if ($actualVersion -ne $env:EXPECTED_CANDIDATE_VERSION) { throw 'package.json version does not match candidate_version.' }
          "PICOM_CANDIDATE_COMMIT=$actualCommit" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PICOM_CANDIDATE_VERSION=$actualVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - run: npm ci
      - run: npm run quality:gate
      - run: npm run package:win
      - name: Verify installer signature, publisher and timestamp
        shell: pwsh
        run: ./scripts/verify-windows-signature.ps1 -Path 'release/Picom-*-Windows-x64.exe' -ExpectedPublisher $env:EXPECTED_WINDOWS_PUBLISHER
      - name: Generate post-signing checksum and provenance
        shell: pwsh
        run: |
          npm run generate-checksums
          npm run verify-checksums
          npm run generate-provenance
      - name: Upload immutable candidate evidence
        uses: actions/upload-artifact@v4
        with:
          name: picom-windows-signed-candidate
          path: |
            release/Picom-*-Windows-x64.exe
            release/SHA256SUMS.txt
            release/provenance.json
          if-no-files-found: error
          retention-days: 14
